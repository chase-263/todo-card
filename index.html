<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Item Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">

    <article
      data-testid="test-todo-card"
      role="region"
      aria-labelledby="todo-title"
    >

    <!-- CHECKBOX + TITLE -->
      <div class="card-top">
        <input
          type="checkbox"
          id="complete-toggle"
          data-testid="test-todo-complete-toggle"
          aria-label="Mark task as complete"
          onchange="handleToggle(this)"
        />
        <label for="complete-toggle">Done</label>
        <h2
          data-testid="test-todo-title"
          id="todo-title"
        >
          Testable Todo Item Card
        </h2>
      </div>

      <!-- DESCRIPTION -->
      <p data-testid="test-todo-description">
         Task Card component
      </p>

       <!-- PRIORITY + STATUS -->
      <div class="badges">
        <span
          data-testid="test-todo-priority"
          class="badge badge-priority"
          aria-label="Priority: High"
        >High</span>

         <span
          data-testid="test-todo-status"
          class="badge badge-status"
          id="status-badge"
          aria-label="Status: In Progress"
        >In Progress</span>
      </div>

       <div class="due-row">
        <span class="due-label">Due:</span>
        <time
          data-testid="test-todo-due-date"
          datetime="2026-04-16T18:00:00Z"
        >Apr 16, 2026</time>

         <span
          data-testid="test-todo-time-remaining"
          class="time-chip"
          id="time-remaining"
          aria-live="polite"
          aria-label="Time remaining"
        >Calculating...</span>
      </div>

      <!-- TAGS -->
      <ul data-testid="test-todo-tags" role="list" aria-label="Task tags" class="tags">
  <li role="listitem" data-testid="test-todo-tag-work">work</li>
  <li role="listitem" data-testid="test-todo-tag-urgent">urgent</li>
  <li role="listitem" data-testid="test-todo-tag-design">design</li>
</ul>

       <div class="actions">
        <button
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          onclick="console.log('edit clicked')"
        >Edit</button>

        <button
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          onclick="alert('Delete clicked')"
        >Delete</button>
      </div>

    </article>

  </main>

  <script src="script.js"></script>
</body>
</html>
